                if (!day || !month || !yearBE) return '';
                const today = new Date();
                const birthYearCE = parseInt(yearBE) - 543;
                let age = today.getFullYear() - birthYearCE;
                if (today.getMonth() + 1 - parseInt(month) < 0 || (today.getMonth() + 1 === parseInt(month) && today.getDate() < parseInt(day))) age--;
                return age >= 0 ? age : '';

                switch(currentPage) {
                    case "หน้าแรก": return <HomeSection setCurrentPage={setCurrentPage} />;
                    case "ผู้สนใจเข้าศึกษา": return <AdmissionSection />;
                    case "ระบบสารสนเทศ": return <LoginSection />;
                    case "นักศึกษาปัจจุบัน": return <StudentsSection />;
                    case "ติดต่อเรา": return <ContactSection />;
                    case "บุคลากร": return <PersonnelSection />;
                    default: return <HomeSection setCurrentPage={setCurrentPage} />;
                }
            };

            return (
                <div className="min-h-screen bg-[#f4f7f9] relative overflow-x-hidden flex flex-col">
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-400/5 blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-orange-400/5 blur-[120px] pointer-events-none"></div>

                    <Header currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    
                    <main className="flex-1">

                    </main>

                </div>
            );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
